<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kvíz pre moje zlatko ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
}

.card{
padding:20px;
max-width:500px;
margin:auto;
}

button{
width:90%;
max-width:350px;
padding:15px;
margin:8px;
font-size:18px;
border:none;
border-radius:14px;
background:#ff4b7d;
color:white;
}

#cry{
font-size:70px;
display:none;
}

#message{
font-size:22px;
margin-top:10px;
}

#game{
display:none;
}

#playArea{
width:100%;
height:350px;
background:white;
border-radius:15px;
position:relative;
overflow:hidden;
margin-top:15px;
}

.heart{
position:absolute;
font-size:35px;
}

#finalScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ff4b7d;
color:white;
display:none;
align-items:center;
justify-content:center;
text-align:center;
font-size:30px;
padding:20px;
}

</style>
</head>

<body>

<div class="card" id="quiz">

<h2>Kvíz pre moje zlatko ❤️</h2>

<p id="question"></p>

<div id="answers"></div>

<div id="cry">😢</div>

<div id="message"></div>

</div>


<div class="card" id="game">

<h2>Bonus hra ❤️</h2>

<p>Chyť čo najviac srdiečok za 30 sekúnd</p>

<p>Skóre: <span id="score">0</span></p>

<p>Čas: <span id="time">30</span></p>

<div id="playArea"></div>

</div>


<div id="finalScreen">

<div>
<h1>Prajem prekrásne výročie ❤️</h1>
<p>Moje zlatko, milujem ťa 💖</p>
</div>

</div>


<script>

let tySize=18
let repeatClicks=0
let lastClick=-1

const questions=[

{
type:"beauty",
q:"Kto je najkrajší na svete?",
a:["Susedka","Bella 🐶","Herečka z filmu","Ja ❤️"]
},

{
type:"reward",
q:"Čo si zaslúži moje zlatko?",
a:["Objatie 🤗","Pusu 😘","Čokoládu 🍫","Všetko naraz ❤️"]
},

{
type:"day",
q:"Kto mi najviac zlepšuje deň?",
a:["Káva ☕","Spánok 😴","Moje zlatko ❤️","Instagram"]
},

{
type:"princess",
q:"Kto je moja princezná?",
a:["Ja ❤️","Ja ❤️","Ja ❤️","Ja ❤️"]
},

{
type:"cute",
q:"Kto je najroztomilejší človek?",
a:["Ja ❤️","Ja ❤️","Ja ❤️","Ja ❤️"]
}

]

let current=0

function loadQuestion(){

document.getElementById("cry").style.display="none"
document.getElementById("message").innerText=""

let q=questions[current]

document.getElementById("question").innerText=q.q

let html=""

q.a.forEach((ans,i)=>{

if(q.type==="beauty" && ans.includes("Ja")){
html+=`<button style="font-size:${tySize}px" onclick="answer(${i})">${ans}</button>`
}else{
html+=`<button onclick="answer(${i})">${ans}</button>`
}

})

document.getElementById("answers").innerHTML=html

}

function answer(i){

let q=questions[current]

if(q.type==="beauty"){

if(q.a[i].includes("Ja")){

document.getElementById("message").innerText="No vidíš krásavica moja ❤️"
setTimeout(nextQuestion,1500)

}else{

tySize+=5
loadQuestion()

}

return
}

if(q.type==="reward"){

if(!q.a[i].includes("Všetko")){

let cry=document.getElementById("cry")
cry.style.display="block"

setTimeout(()=>{
cry.style.display="none"
},2000)

return

}else{

document.getElementById("message").innerText="A ešte oveľa viac princezná moja ❤️"
setTimeout(nextQuestion,1500)

return
}

}

if(q.type==="day"){

if(q.a[i].includes("Moje zlatko")){

nextQuestion()
return

}else{

document.getElementById("cry").style.display="block"
document.getElementById("message").innerText="Určite? 😢"

if(lastClick===i){
repeatClicks++
}else{
repeatClicks=1
}

lastClick=i

if(repeatClicks>=3){
setTimeout(nextQuestion,1000)
}

return
}

}

if(q.type==="princess"){

document.getElementById("message").innerText="No vidíš mojušik ❤️"
setTimeout(nextQuestion,1500)
return
}

if(q.type==="cute"){

document.getElementById("message").innerText="Jasné že ty anjelik môj ❤️"
setTimeout(nextQuestion,1500)
return
}

nextQuestion()

}

function nextQuestion(){

current++
repeatClicks=0
lastClick=-1

if(current<questions.length){

loadQuestion()

}else{

startGame()

}

}

loadQuestion()



let score=0
let time=30

function startGame(){

document.getElementById("quiz").style.display="none"
document.getElementById("game").style.display="block"

spawnHearts()

let timer=setInterval(()=>{

time--
document.getElementById("time").innerText=time

if(time<=0){

clearInterval(timer)

score++

document.getElementById("game").style.display="none"
document.getElementById("finalScreen").style.display="flex"

}

},1000)

}



function spawnHearts(){

const area=document.getElementById("playArea")

setInterval(()=>{

let heart=document.createElement("div")
heart.className="heart"
heart.innerText="❤️"

heart.style.left=Math.random()*90+"%"
heart.style.top="-30px"

area.appendChild(heart)

let fall=setInterval(()=>{

let top=parseFloat(heart.style.top)
heart.style.top=(top+3)+"px"

if(top>350){
heart.remove()
clearInterval(fall)
}

},20)

heart.onclick=()=>{

score++
document.getElementById("score").innerText=score
heart.remove()

}

},700)

}

</script>

</body>
</html>
